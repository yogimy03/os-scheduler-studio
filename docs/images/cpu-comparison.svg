  <text x="467" y="75" fill="#9ca3af" font-size="13">5.80</text>
  <text x="198" y="109" fill="#e5e7eb" font-size="14" text-anchor="end">Shortest Job First</text>
  <rect x="210" y="92" width="206" height="22" rx="5" fill="#e8703a"/>
  <text x="424" y="109" fill="#9ca3af" font-size="13">4.80</text>
  <text x="198" y="143" fill="#e5e7eb" font-size="14" text-anchor="end">Shortest Remaining Time First</text>
  <rect x="210" y="126" width="163" height="22" rx="5" fill="#57b26a"/>
  <text x="381" y="143" fill="#9ca3af" font-size="13">3.80</text>
