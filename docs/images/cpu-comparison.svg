  <rect x="210" y="160" width="291" height="22" rx="5" fill="#c65cd6"/>
  <text x="509" y="177" fill="#9ca3af" font-size="13">6.80</text>
  <text x="198" y="211" fill="#e5e7eb" font-size="14" text-anchor="end">Longest Remaining Time First</text>
  <rect x="210" y="194" width="420" height="22" rx="5" fill="#e0c341"/>
  <text x="638" y="211" fill="#9ca3af" font-size="13">9.80</text>
  <text x="198" y="245" fill="#e5e7eb" font-size="14" text-anchor="end">Highest Response Ratio Next</text>
  <rect x="210" y="228" width="214" height="22" rx="5" fill="#3ec9c0"/>
  <text x="432" y="245" fill="#9ca3af" font-size="13">5.00</text>
  <text x="198" y="279" fill="#e5e7eb" font-size="14" text-anchor="end">Priority (non-preemptive)</text>
  <rect x="210" y="262" width="274" height="22" rx="5" fill="#e2688f"/>
  <text x="492" y="279" fill="#9ca3af" font-size="13">6.40</text>
