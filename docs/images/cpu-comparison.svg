<svg xmlns="http://www.w3.org/2000/svg" width="700" height="388" viewBox="0 0 700 388" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="700" height="388" rx="14" fill="#111827"/>
